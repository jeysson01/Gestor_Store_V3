services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory
    volumes:
      - inventory_pg_data:/var/lib/postgresql/data

volumes:
  inventory_pg_data:
